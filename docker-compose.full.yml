# Full stack compose — includes API and client containers for production-like testing
include:
  - docker-compose.yml

services:
  api:
    build:
      context: .
      dockerfile: src/GreenPlot.Api/Dockerfile
    container_name: greenplot-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=greenplot;Username=greenplot;Password=greenplot_dev"
      Jwt__Key: "REPLACE_WITH_SECURE_KEY_MIN_32_CHARS_LONG_FOR_PRODUCTION"
      Jwt__Issuer: "https://greenplot.app"
      Jwt__Audience: "greenplot-client"
      AllowedOrigins__0: "http://localhost:5173"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: greenplot-client
    environment:
      VITE_API_URL: "http://localhost:5000"
    ports:
      - "5173:5173"
    depends_on:
      - api
